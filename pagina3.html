<head>

<body class="pagina3 gallery-page">
    <header><h1 data-i18n="pagina3.title">Il progetto MARIS</h1></header>
<!-- NAV ARROWS -->
<a href="pagina2.html" class="nav-arrow nav-arrow-left" aria-label="Sinistra">

    <!-- Porta per accedere alla pagina nascosta -->
    <div class="door-img-container">
        <img id="porta" src="assets/porta-chiusa.png" alt="Porta" />
    </div>
    <main class="gallery-wall-container">
        <script>
        let aperta = false;
        const porta = document.getElementById('porta');
        porta.addEventListener('click', function () {
            aperta = !aperta;
            porta.src = aperta ? 'assets/porta-aperta.png' : 'assets/porta-chiusa.png';
            if (aperta) {
                setTimeout(function() {
                    window.location.href = 'pagina-nascosta.html';
                }, 1200); // 1.2 secondi
            }
        });
        </script>
        <div class="gallery-wall" style="margin: 0 auto;">
            <!-- 5 pannelli -->
           <div class="painting-unit">
                <div class="painting-frame" data-index="0">
                    <div class="card-inner">
                        <div class="card-front">
                            <img src="assets/pannelli/copertine/maris1.jpg" style="width:100%; height:100%; object-fit:cover;">
                            <div class="painting-hover-title">Visione e Identità</div>
                            <button class="flip-btn" style="position:absolute; bottom:5px; right:5px; z-index:100; cursor:pointer;">↻</button>
                        </div>
                        <div class="card-back"><p>Retro Opera 1</p></div>
                    </div>
                    <div class="painting-credit-vertical">[crediti o fonte]</div>
                </div>
                <div class="museum-label"></div>
            </div> 
            <div class="painting-unit">
                <div class="painting-frame" data-index="1">

                        <div class="card-back"><p>Retro Opera 3</p></div>

                <div class="museum-label"></div>

    <!-- MODALE -->
    <div id="painting-modal" class="modal-overlay">
        <div class="modal-top-bar">
            <div class="modal-thumbnails">
                <div class="thumb active" data-index="0" data-title="I"></div>
                <div class="thumb" data-index="1" data-title="II"></div>
                <div class="thumb" data-index="2" data-title="III"></div>
                <div class="thumb" data-index="3" data-title="IV"></div>
                <div class="thumb" data-index="4" data-title="V"></div>
            </div>

        </div>
        <div class="modal-container">
            <div id="modal-dynamic-content"></div>
        </div>
